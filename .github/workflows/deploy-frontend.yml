name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Force any node20-pinned action (currently cloudflare/wrangler-action
    # @v3.15.0) to execute on Node 24. This matches GitHub's mandatory
    # default starting 2026-06-02 and removes the runtime deprecation
    # warning ahead of time. Safe to drop once wrangler-action ships v4.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: https://skillsight-api.onrender.com

      # NOTE: wrangler-action still ships on Node 20 as of v3.15.0
      # (upstream Node 24 / Wrangler v4 upgrade is tracked in
      # cloudflare/wrangler-action#415 and #410). Pin explicitly so the
      # bump is a one-line change once upstream releases v4.
      # Pass an explicit commit-message / commit-hash so wrangler does not
      # forward the raw git message to Cloudflare's API. The CF Pages API
      # rejects messages it considers "Invalid UTF-8" (code 8000111), which
      # has tripped on otherwise-valid messages containing escaped
      # backslashes ("\\x00") in code-block style fixes. A short ASCII
      # commit message keeps the deploy resilient.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy web/out --project-name=skillsight
            --branch=main
            --commit-hash=${{ github.sha }}
            --commit-message=ci-deploy-${{ github.sha }}
            --commit-dirty=true
