# SkillSight CI - Golden Path Gate
# Runs on PR and push to main. Fails if tests or E2E fail.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          cd backend && pip install -r requirements.txt

      - name: Start services (Postgres, Redis, Qdrant, Ollama)
        run: |
          docker compose up -d postgres redis qdrant ollama
          sleep 10

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker exec skillsight_db pg_isready -U skillsight -d skillsight 2>/dev/null && break
            sleep 2
          done

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg2://skillsight:skillsight@127.0.0.1:55432/skillsight
        run: |
          PYTHONPATH=. python -m alembic -c backend/alembic.ini upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+psycopg2://skillsight:skillsight@127.0.0.1:55432/skillsight
          SKILLSIGHT_AUTH_SECRET: ci_test_secret_change_in_production
          SKILLSIGHT_ENV: development
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 56379
        run: |
          cd backend && PYTHONPATH=.. python -m pytest tests/ -v --tb=short 2>&1 | tee ../pytest.log

      - name: Start backend
        env:
          DATABASE_URL: postgresql+psycopg2://skillsight:skillsight@127.0.0.1:55432/skillsight
          SKILLSIGHT_AUTH_SECRET: ci_test_secret_change_in_production
          SKILLSIGHT_ENV: development
          QDRANT_HOST: 127.0.0.1
          QDRANT_PORT: 6333
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 56379
        run: |
          PYTHONPATH=. python -m uvicorn backend.app.main:app --host 127.0.0.1 --port 8001 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8001/health > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Run E2E Golden Path
        run: |
          ./scripts/e2e_golden_path.sh http://127.0.0.1:8001 55432 2>&1 | tee e2e.log || true

      - name: Run i18n route screenshots
        run: |
          cd web
          npm ci
          NEXT_PUBLIC_API_URL=http://127.0.0.1:8001 npm run test:e2e:i18n-screenshots 2>&1 | tee ../e2e-i18n-screenshots.log || true

      - name: Run k6 smoke (10 RPS, 15s)
        run: |
          SMOKE=1 ./scripts/run_assessment_k6_matrix.sh http://127.0.0.1:8001 2>&1 | tee k6-smoke.log

      - name: Run k6 submit matrix (100/300/500 RPS)
        run: |
          ./scripts/run_assessment_k6_matrix.sh http://127.0.0.1:8001 2>&1 | tee k6.log || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: |
            pytest.log
            e2e.log
            e2e-i18n-screenshots.log
            k6-smoke.log
            k6.log
            artifacts/perf/*.json
            web/test-results/i18n-route-snapshots/**

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-artifacts
          path: |
            artifacts/perf/*.json
            web/test-results/i18n-route-snapshots/**

      - name: Fail if E2E core path did not pass
        run: |
          if grep -q "ALL 10 STEPS PASSED" e2e.log; then
            echo "All 10 E2E steps passed"
          elif grep -q "\[STEP 7\]" e2e.log && grep -q "OK (items=" e2e.log; then
            echo "Core E2E path (steps 1-7) passed; AI-dependent steps 8-10 skipped (no OPENAI_API_KEY in CI)"
          else
            echo "E2E core path did not pass" && cat e2e.log && exit 1
          fi
