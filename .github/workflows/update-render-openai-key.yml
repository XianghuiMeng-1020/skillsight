name: Update Render OpenAI API Key

on:
  workflow_dispatch:
    inputs:
      render_api_key:
        description: "Render API Key (from https://dashboard.render.com/u/settings#api-keys)"
        required: true
        type: string
      service_id_api:
        description: "Render service ID for skillsight-api (starts with srv-)"
        required: true
        type: string
      service_id_worker:
        description: "Render service ID for skillsight-worker (starts with srv-)"
        required: true
        type: string

jobs:
  update-env:
    runs-on: ubuntu-latest
    steps:
      - name: Update OPENAI_API_KEY on skillsight-api
        run: |
          curl -s -X PUT \
            "https://api.render.com/v1/services/${{ github.event.inputs.service_id_api }}/env-vars" \
            -H "Authorization: Bearer ${{ github.event.inputs.render_api_key }}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"OPENAI_API_KEY","value":"${{ secrets.OPENAI_API_KEY }}"}]' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('api service updated:', len(d), 'vars')"

      - name: Update OPENAI_API_KEY on skillsight-worker
        run: |
          curl -s -X PUT \
            "https://api.render.com/v1/services/${{ github.event.inputs.service_id_worker }}/env-vars" \
            -H "Authorization: Bearer ${{ github.event.inputs.render_api_key }}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"OPENAI_API_KEY","value":"${{ secrets.OPENAI_API_KEY }}"}]' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('worker service updated:', len(d), 'vars')"

      - name: Trigger redeploy of skillsight-api
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ github.event.inputs.service_id_api }}/deploys" \
            -H "Authorization: Bearer ${{ github.event.inputs.render_api_key }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('deploy triggered:', d.get('id',''))"
