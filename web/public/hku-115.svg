<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- HKU Shield Base -->
  <rect x="10" y="10" width="50" height="60" rx="4" fill="#006847"/>
  <rect x="14" y="14" width="42" height="52" rx="2" fill="#ffffff"/>
  
  <!-- Shield Design Elements -->
  <rect x="18" y="18" width="16" height="22" fill="#006847"/>
  <rect x="36" y="18" width="16" height="22" fill="#C9A227"/>
  <rect x="18" y="42" width="16" height="20" fill="#C9A227"/>
  <rect x="36" y="42" width="16" height="20" fill="#006847"/>
  
  <!-- Book Symbol -->
  <path d="M22 24 L30 28 L30 36 L22 32 Z" fill="white"/>
  <path d="M30 28 L38 24 L38 32 L30 36 Z" fill="#E8E8E8"/>
  
  <!-- 115 Number -->
  <text x="75" y="45" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#C9A227">
    1<tspan font-size="28">1</tspan>5
  </text>
  
  <!-- HKU Text -->
  <text x="145" y="32" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#C9A227">
    HKU
  </text>
  
  <!-- Anniversary Line -->
  <line x1="75" y1="55" x2="180" y2="55" stroke="#C9A227" stroke-width="1"/>
  
  <!-- Years -->
  <text x="90" y="70" font-family="Georgia, serif" font-size="10" fill="#666666">
    1911 - 2026
  </text>
</svg>
