services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: skillsight-db
    # Default max_connections=100 was insufficient at 50 concurrent users
    # (4 uvicorn workers x pool_size=20 + overflow + alembic + health > 100).
    command: postgres -c max_connections=300 -c shared_buffers=256MB -c idle_in_transaction_session_timeout=60000
    environment:
      POSTGRES_USER: skillsight
      POSTGRES_PASSWORD: skillsight
      POSTGRES_DB: skillsight
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillsight"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skillsight-network

  # Redis (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: skillsight-redis
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skillsight-network

  # Qdrant (vector database, optional)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: skillsight-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - skillsight-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: skillsight-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://skillsight:skillsight@postgres:5432/skillsight
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_URL: http://qdrant:6333
      SKILLSIGHT_AUTH_SECRET: your-secret-key-change-in-production
      SKILLSIGHT_ENV: production
      # Demo/local only; omit in real production deployments
      SKILLSIGHT_ALLOW_DEV_LOGIN: "true"
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini
      CORS_ALLOWED_ORIGINS: "*"
      RATE_LIMIT_ENABLED: "true"
      DB_POOL_SIZE: "15"
      DB_MAX_OVERFLOW: "15"
      DB_POOL_TIMEOUT: "30"
      AUTO_ASSESS_SKILL_LIMIT: "20"
      LLM_MAX_CONCURRENT: "8"
      LLM_MAX_RETRIES: "4"
      LLM_RETRY_BASE_S: "1.5"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - skillsight-network
    restart: unless-stopped

  # RQ background worker: parsing, embedding, assessment repair.
  # Without this, jobs enqueued via backend/app/queue.py would sit in
  # Redis forever and the "upload -> parse -> embed" path would silently
  # fall back to running everything synchronously inside the web request.
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["sh", "-c", "cd /opt/src && python -m rq.cli worker --url redis://redis:6379 skillsight"]
    environment:
      DATABASE_URL: postgresql+psycopg2://skillsight:skillsight@postgres:5432/skillsight
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_URL: http://qdrant:6333
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini
      LLM_MAX_CONCURRENT: "4"
      LLM_MAX_RETRIES: "4"
      LLM_RETRY_BASE_S: "1.5"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - skillsight-network
    restart: unless-stopped
    deploy:
      replicas: 2

  # Frontend (Next.js static export served by nginx)
  frontend:
    image: nginx:alpine
    container_name: skillsight-frontend
    ports:
      - "3000:80"
    volumes:
      - ./web/out:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - skillsight-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  skillsight-network:
    driver: bridge