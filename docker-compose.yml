services:
  postgres:
    image: postgres:16
    container_name: skillsight_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillsight
      POSTGRES_PASSWORD: skillsight
      POSTGRES_DB: skillsight
    ports:
      - "55432:5432"
    volumes:
      - skillsight_pgdata:/var/lib/postgresql/data
volumes:
  skillsight_pgdata:
