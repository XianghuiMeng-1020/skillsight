services:
  - type: web
    name: skillsight-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillsight-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: skillsight-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: skillsight-redis
          type: redis
          property: port
      - key: SKILLSIGHT_AUTH_SECRET
        generateValue: true
      - key: SKILLSIGHT_ENV
        value: production
      - key: SKILLSIGHT_ALLOW_DEV_LOGIN
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: https://skillsight.pages.dev,https://skillsight-230.pages.dev,https://www.skillsight.pages.dev,https://39785649.skillsight-230-97u.pages.dev
      - key: RATE_LIMIT_ENABLED
        value: "true"
      # IMPORTANT: rate-limit buckets are per source IP and shared across
      # instances via Redis. A 60-person HKU demo is NAT'd to one egress IP,
      # so the effective ceiling for any LLM-backed path is whatever number
      # we set here. Old values (6/20/30) silently 429'd most students once
      # ~10 of them hit "Run review" within the same minute. LLM_MAX_CONCURRENT
      # already caps real OpenAI fan-out at 8, so generous limits here are
      # safe and only block obvious abuse.
      - key: RATE_LIMIT_PER_MINUTE_RESUME_LLM
        value: "300"
      - key: RATE_LIMIT_PER_MINUTE_AI
        value: "300"
      - key: RATE_LIMIT_PER_MINUTE_ASSESS
        value: "300"
      # Rate limits are bucketed per source IP. During the 50-user demo all
      # participants typically share the same campus NAT egress IP, so the
      # default 60/min would 429 the moment more than ~10 people sign in
      # within a minute. The bumps below give each path enough headroom for
      # a 50-person live demo without disabling rate limiting entirely.
      - key: RATE_LIMIT_PER_MINUTE_AUTH
        value: "600"
      - key: RATE_LIMIT_PER_MINUTE_UPLOAD
        value: "300"
      - key: RATE_LIMIT_PER_MINUTE_INTERACTIVE
        value: "300"
      - key: RATE_LIMIT_PER_MINUTE_SEARCH
        value: "300"
      - key: RATE_LIMIT_PER_MINUTE
        value: "300"
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # Concurrency knobs: at most 8 concurrent OpenAI calls per process
      - key: LLM_MAX_CONCURRENT
        value: "8"
      - key: LLM_MAX_RETRIES
        value: "3"
      - key: LLM_RETRY_BASE_S
        value: "2.0"
      # Emergency kill-switch: set to "true" to disable all LLM calls instantly
      # and return rule-based fallback responses only.
      - key: LLM_FALLBACK_RULES_ONLY
        value: "false"
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_FALLBACK_CURL
        value: "true"
      - key: QDRANT_EMBED_RETRIES
        value: "3"
      # Per-worker pool size reduced so 4 workers × 10 = 40 < Render Standard PG limit (97).
      # With max_overflow=15 worst-case is 4×25=100; pool_timeout=30 keeps queuing short.
      - key: DB_POOL_SIZE
        value: "10"
      - key: DB_MAX_OVERFLOW
        value: "15"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: WEB_CONCURRENCY
        value: "4"
    healthCheckPath: /health
    # Two API instances share the load; each holds at most 40 PG connections.
    numInstances: 2

  - type: worker
    name: skillsight-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    # Upgraded from starter (0.5 vCPU/512 MB) to standard so PDF/DOCX parsing
    # doesn't OOM when 50 users upload simultaneously.
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillsight-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: skillsight-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: skillsight-redis
          type: redis
          property: port
      - key: SKILLSIGHT_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_FALLBACK_CURL
        value: "true"
      - key: QDRANT_EMBED_RETRIES
        value: "3"
    dockerCommand: python -m backend.worker

  - type: redis
    name: skillsight-redis
    # Upgraded from starter to standard for higher memory ceiling.
    plan: standard
    # allkeys-lru: evict least-recently-used keys when memory is full rather
    # than blocking new writes (noeviction would OOM-kill the queue).
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: skillsight-db
    # Upgraded from starter (97 connections) to standard (171 connections)
    # to safely support 2 web instances × 4 workers × 25 connections each = 200 theoretical
    # but real usage is much lower due to DB release around LLM calls.
    plan: standard
    postgresMajorVersion: "16"
