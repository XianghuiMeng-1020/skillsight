services:
  - type: web
    name: skillsight-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillsight-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: skillsight-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: skillsight-redis
          type: redis
          property: port
      - key: SKILLSIGHT_AUTH_SECRET
        generateValue: true
      - key: SKILLSIGHT_ENV
        value: production
      - key: CORS_ALLOWED_ORIGINS
        value: https://skillsight.pages.dev,https://www.skillsight.pages.dev
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: DB_POOL_SIZE
        value: "10"
      - key: DB_MAX_OVERFLOW
        value: "15"
      - key: WEB_CONCURRENCY
        value: "2"
    healthCheckPath: /health
    numInstances: 1

  - type: worker
    name: skillsight-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillsight-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: skillsight-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: skillsight-redis
          type: redis
          property: port
      - key: SKILLSIGHT_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
    dockerCommand: python -m backend.worker

databases:
  - name: skillsight-db
    plan: starter
    postgresMajorVersion: "16"

  - name: skillsight-redis
    plan: starter
    type: redis
